<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Malik Babar Ali</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./js/tailwind-config.js"></script>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-foreground relative min-h-screen flex">
  
  <div class="bg-mesh"></div>

  <!-- Sidebar -->
  <aside class="w-64 bg-card border-r border-white/10 flex flex-col h-screen fixed left-0 top-0">
    <div class="p-6 border-b border-white/10">
      <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
        <i data-lucide="shield" class="w-6 h-6 text-accent"></i> Admin Panel
      </h1>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <button onclick="switchTab('projects')" id="tab-projects" class="w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition-colors bg-accent/10 text-accent font-medium">
        <i data-lucide="folder" class="w-5 h-5"></i> Projects
      </button>
      <button onclick="switchTab('messages')" id="tab-messages" class="w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition-colors text-white/70 hover:bg-white/5 hover:text-white">
        <i data-lucide="mail" class="w-5 h-5"></i> Messages
      </button>
    </nav>
    <div class="p-6 border-t border-white/10">
      <a href="index.html" class="flex items-center gap-2 text-white/50 hover:text-white transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Site
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 flex-1 p-8 h-screen overflow-y-auto custom-scrollbar">
    
    <!-- Projects View -->
    <div id="view-projects">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold text-white">Manage Projects</h2>
        <button onclick="openProjectModal()" class="px-4 py-2 bg-accent text-white rounded-lg flex items-center gap-2 hover:bg-accent/90 transition-colors">
          <i data-lucide="plus" class="w-4 h-4"></i> Add Project
        </button>
      </div>

      <div id="projects-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <p class="text-white/50">Loading projects...</p>
      </div>
    </div>

    <!-- Messages View -->
    <div id="view-messages" class="hidden">
      <div class="mb-8">
        <h2 class="text-3xl font-bold text-white">Contact Messages</h2>
      </div>

      <div class="saas-card overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-white/5 border-b border-white/10 text-sm text-white/50">
              <th class="p-4 font-medium">Date</th>
              <th class="p-4 font-medium">Name</th>
              <th class="p-4 font-medium">Email</th>
              <th class="p-4 font-medium">Message</th>
              <th class="p-4 font-medium text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="messages-list" class="text-sm">
            <tr><td colspan="5" class="p-4 text-center text-white/50">Loading messages...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Project Modal -->
  <div id="project-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-card border border-white/10 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
      <div class="p-6 border-b border-white/10 flex justify-between items-center">
        <h3 id="modal-title" class="text-xl font-bold text-white">Add Project</h3>
        <button onclick="closeProjectModal()" class="text-white/50 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div class="p-6">
        <form id="project-form" class="space-y-4">
          <input type="hidden" id="project-id">
          
          <div>
            <label class="block text-sm font-medium text-white/70 mb-1">Title</label>
            <input type="text" id="project-title" required class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-accent outline-none">
          </div>

          <div>
            <label class="block text-sm font-medium text-white/70 mb-1">Description</label>
            <textarea id="project-desc" required rows="3" class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-accent outline-none resize-none"></textarea>
          </div>

          <div>
            <label class="block text-sm font-medium text-white/70 mb-1">Problem (Optional)</label>
            <textarea id="project-problem" rows="2" class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-accent outline-none resize-none"></textarea>
          </div>

          <div>
            <label class="block text-sm font-medium text-white/70 mb-1">Solution (Optional)</label>
            <textarea id="project-solution" rows="2" class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-accent outline-none resize-none"></textarea>
          </div>

          <div>
            <label class="block text-sm font-medium text-white/70 mb-1">Tech Stack (comma separated)</label>
            <input type="text" id="project-tech" class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-accent outline-none">
          </div>

          <div>
            <label class="block text-sm font-medium text-white/70 mb-1">Image URL</label>
            <input type="text" id="project-image" class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-accent outline-none" placeholder="https://...">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-white/70 mb-1">Live Link</label>
              <input type="text" id="project-live" class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-accent outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-white/70 mb-1">GitHub Link</label>
              <input type="text" id="project-github" class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-accent outline-none">
            </div>
          </div>

          <div class="pt-4 flex justify-end gap-3">
            <button type="button" onclick="closeProjectModal()" class="px-4 py-2 bg-white/5 text-white rounded-lg hover:bg-white/10 transition-colors">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-accent text-white rounded-lg hover:bg-accent/90 transition-colors">Save Project</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="./js/admin.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
